<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My js13k Game</title>
    <style>
        /* 重置預設樣式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 讓 canvas 置中顯示 */
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            background: #000;
            /* 可選：加個邊框方便開發時看到邊界 */
            border: 1px solid #333;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <script src="game.js"></script>
</body>

</html>
